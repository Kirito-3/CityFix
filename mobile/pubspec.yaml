name: cityfix_mobile
description: Production-ready mobile client for CityFix Civic Issue Reporting Platform
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.3.6

  # Networking
  dio: ^5.2.1

  # Navigation
  go_router: ^9.0.0

  # Storage & Utilities
  flutter_secure_storage: ^8.0.0
  intl: ^0.18.1
  collection: ^1.17.1

  # Push Notifications & Core Firebase
  firebase_core: ^2.15.0
  firebase_messaging: ^14.6.6

  # Device Hardware Integration
  image_picker: ^1.0.1
  geolocator: ^10.0.1
  google_maps_flutter: ^2.4.0
  cupertino_icons: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    # Future placeholder path config
    - assets/images/
